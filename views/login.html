<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CREARTE</title>

    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

    <div class="container">

        <!-- LADO IZQUIERDO -->
        <div class="left-section">

            <img 
                src="/assets/fondo azul login.svg" 
                alt="Fondo Azul"
                class="bg-blue"
            >

            <img 
                src="/assets/Fondo de esculturas.svg" 
                alt="Esculturas"
                class="sculpture"
            >

        </div>

        <!-- LADO DERECHO -->
        <div class="right-section">

            <div class="login-card">

                <!-- LOGO -->
                <img 
                    src="/assets/logo crearte azul.svg" 
                    alt="Logo CreArte"
                    class="logo"
                >

                <!-- TITULO -->
                <h1>Bienvenido de nuevo</h1>

                <p class="subtitle">
                    Inicia sesión para continuar tu camino creativo.
                </p>

                <!-- FORMULARIO -->
                <form id="formLogin">

                    <!-- CORREO -->
                    <input 
                        type="email" 
                        id="correo"
                        placeholder="Ingresa tu correo electrónico"
                        required
                    >

                    <!-- CONTRASEÑA -->
                    <input 
                        type="password" 
                        id="contraseña"
                        placeholder="Contraseña"
                        required
                    >

                    <!-- BOTON -->
                    <button type="submit">
                        Iniciar sesión
                    </button>

                    <!-- OPCIONES -->
                    <div class="options">

                        <label class="remember">
                            <input type="checkbox">
                            Recuérdame
                        </label>

                        <a href="#">
                            ¿Olvidaste tu contraseña?
                        </a>

                    </div>

                    <!-- MENSAJE -->
                    <p id="mensaje"></p>

                    <!-- DIVISOR -->
                    <div class="divider">

                        <span></span>

                        <p>O continua con</p>

                        <span></span>

                    </div>

                    <!-- LOGIN SOCIAL -->
                    <div class="social-login">

                        <button type="button" class="social-btn">

                            <img 
                                src="/assets/icono logo google 1.svg" 
                                alt="Google"
                            >

                        </button>

                        <button type="button" class="social-btn">

                            <img 
                                src="/assets/icono logo facebook 1.svg" 
                                alt="Facebook"
                            >

                        </button>

                        <button type="button" class="social-btn">

                            <img 
                                src="/assets/icono logo apple 1.svg" 
                                alt="Apple"
                            >

                        </button>

                    </div>

                    <!-- REGISTRO -->
                    <p class="register">
                        ¿Todavía no tienes una cuenta?
                        <a href="#">
                            Regístrate
                        </a>
                    </p>

                </form>

            </div>

        </div>

    </div>

    <script src="/js/login.js"></script>

</body>
</html>
