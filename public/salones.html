<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Salones - CREARTE</title>

</head>

<body>

    <h1>Gestión de Salones</h1>

    <form id="formSalon">

        <label>Nombre del salón:</label>

        <input
            type="text"
            id="nombre_salon"
            placeholder="Ej. Salón de danza"
            required
        >

        <br><br>

        <label>Capacidad:</label>

        <input
            type="number"
            id="capacidad"
            placeholder="Ej. 20"
            required
        >

        <br><br>

        <button type="submit" id="btnGuardar">
            Guardar Salón
        </button>

    </form>

    <hr>

    <h2>Salones registrados</h2>

    <table border="1">

        <thead>

            <tr>

                <th>ID Salón</th>

                <th>Nombre</th>

                <th>Capacidad</th>

                <th>Acciones</th>

            </tr>

        </thead>

        <tbody id="tablaSalones">
            <!-- Aquí se cargan los salones -->
        </tbody>

    </table>

    <script src="/js/salones.js"></script>

</body>

</html>
