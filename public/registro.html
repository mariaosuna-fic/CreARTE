<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Registro - CREARTE</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/registro.css">

</head>

<script>

    const token = localStorage.getItem('token');
    const rol = localStorage.getItem('rol');

    if (token && rol === 'admin') {

        window.location.href = '/clases.html';

    }

</script>

<body>

    <!-- CONTENEDOR PRINCIPAL -->
    <!--div class="container">

        <!-- =========================
             PANEL IZQUIERDO
        ========================== -->

        <div class="left-panel">

            <!-- Logo -->
            <img
                src="./assets/logo-crearte-morado.svg"
                alt="Logo CreArte"
                class="logo"
            >

            <!-- Imagen artística -->
            <img
                src="./assets/pinceles-lienzo-acuarelas.svg"
                alt="Arte CreArte"
                class="art-image"
            >

        </div>

        <!-- =========================
             PANEL DERECHO
        ========================== -->

        <div class="right-panel">
            
            <div class="form-container">

                <!-- Título -->
                <h1>Crea tu cuenta</h1>

                <!-- Subtítulo -->
                <p class="subtitle">

                    Únete a la Academia de Arte
                    <strong>CreArte</strong>

                    <br>

                    y comienza tu viaje creativo.

                </p>

                <!-- FORMULARIO -->
                <form id="formRegistro">

                    <!-- =========================
                         NOMBRE
                    ========================== -->

                    <label for="nombre">
                        Nombre (s)
                    </label>

                    <div class="input-group input-user">

                        <input
                            type="text"
                            id="nombre"
                            placeholder="Ingresa tu(s) nombre(s)"
                            required
                        >

                    </div>

                    <!-- =========================
                         APELLIDOS
                    ========================== -->

                    <label for="apellido">
                        Apellido (s)
                    </label>

                    <div class="input-group input-user">

                        <input
                            type="text"
                            id="apellido"
                            placeholder="Ingresa tu(s) apellido(s)"
                            required
                        >

                    </div>

                    <!-- =========================
                         CORREO
                    ========================== -->

                    <label for="correo">
                        Correo electrónico
                    </label>

                    <div class="input-group input-email">

                        <input
                            type="email"
                            id="correo"
                            placeholder="Ingresa tu correo electrónico"
                            required
                        >

                    </div>

                    <!-- =========================
                         CONTRASEÑA
                    ========================== -->

                    <label for="contraseña">
                        Contraseña
                    </label>

                    <div class="input-group input-password">

                        <input
                            type="password"
                            id="contraseña"
                            placeholder="Crea una contraseña"
                            required
                        >

                    </div>

                    <!-- =========================
                         CONFIRMAR CONTRASEÑA
                    ========================== -->

                    <label for="confirmar-contraseña">
                        Confirmar contraseña
                    </label>

                    <div class="input-group input-password">

                        <input
                            type="password"
                            id="confirmar-contraseña"
                            placeholder="Confirma tu contraseña"
                            required
                        >

                    </div>

                    <!-- =========================
                         ROL
                    ========================== -->

                    <label for="rol">
                        Usuario
                    </label>

                    <div class="input-group">

                        <select id="rol" required>

                            <option value="" disabled selected>
                                Selecciona un tipo de usuario

                            <option value="Admin">
                                Admin
                            </option>

                            <option value="alumno">
                                Alumno
                            </option>

                            <option value="profesor">
                                Profesor
                            </option>

                        </select>

                    </div>

                    <!-- =========================
                         TÉRMINOS
                    ========================== -->

                    <div class="terms">

                        <input
                            type="checkbox"
                            required
                        >

                        <p>

                            Acepto los

                            <a href="#">
                                Términos y Condiciones
                            </a>

                            y la

                            <a href="#">
                                Política de Privacidad
                            </a>

                        </p>

                    </div>

                    <!-- BOTÓN -->

                    <button type="submit">

                        Crear cuenta

                    </button>

                </form>

                <!-- MENSAJE -->

                <p id="mensaje"></p>

                <!-- LOGIN -->

                <div class="login-link">

                    ¿Ya tienes una cuenta?

                    <a href="/login.html">

                        Inicia sesión

                    </a>

                </div>

            </div>

        </div>

    <!--/div>

    <!-- JS -->
    <script src="/js/registro.js"></script>

</body>

</html>
