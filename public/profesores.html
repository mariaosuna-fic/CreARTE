<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profesores - CREARTE</title>

</head>

<script>

    const token = localStorage.getItem('token');
    const rol = localStorage.getItem('rol');

    if (!token || rol !== 'admin') {

        alert('Debes iniciar sesión como administrador');

        window.location.href = '/login.html';

    }

</script>

<body>

    <h1>Gestión de Profesores</h1>

    <form id="formProfesor">

        <label>Usuario profesor:</label>

        <select id="id_usuario" required>

            <option value="">
                Selecciona un usuario con rol profesor
            </option>

        </select>

        <br><br>

        <label>Especialidad:</label>

        <input 
            type="text"
            id="especialidad"
            placeholder="Ej. Danza, pintura, música"
            required
        >

        <br><br>

        <label>Disponibilidad:</label>

        <input 
            type="text"
            id="disponibilidad"
            placeholder="Ej. Lunes a viernes por la tarde"
            required
        >

        <br><br>

        <button type="submit" id="btnGuardar">
            Guardar Profesor
        </button>

    </form>

    <hr>

    <h2>Profesores registrados</h2>

    <table border="1">

        <thead>

            <tr>

                <th>ID Profesor</th>

                <th>Especialidad</th>

                <th>Disponibilidad</th>

                <th>ID Usuario</th>

                <th>Acciones</th>

            </tr>

        </thead>

        <tbody id="tablaProfesores">
            <!-- Aquí se cargan los profesores -->
        </tbody>

    </table>

    <script src="/js/profesores.js"></script>

</body>

</html>
