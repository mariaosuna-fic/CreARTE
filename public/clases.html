<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreARTE - Administración de Clases</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/clases.css">
</head>

<body class="admin-body">

    <header class="navbar-admin">

        <div class="logo-container-admin">
            <img src="/img/logo_crearte2.png" alt="CreARTE" class="logo-admin">
        </div>

        <a href="#" class="btn-logout" onclick="cerrarSesion()">
            Cerrar sesión ➔
        </a>

    </header>

    <div class="layout-container">

        <aside class="sidebar-admin">

            <nav class="sidebar-nav">

                <a href="#" class="sidebar-link active">Panel</a>

                <a href="#" class="sidebar-link">Cursos</a>

                <a href="#" class="sidebar-link">Alumnos</a>

                <a href="#" class="sidebar-link">Profesores</a>

                <a href="#" class="sidebar-link">Horario</a>

                <a href="#" class="sidebar-link">Salones</a>

            </nav>

        </aside>

        <main class="main-content">

            <header class="content-header">

                <h1>Administración de Clases</h1>

                <p>Gestiona y crea las clases de la academia.</p>

            </header>

            <section class="form-section">

                <div class="form-card">

                    <form id="claseForm" class="clase-form">

                        <input type="hidden" id="id_clase_edicion" value="">

                        <div class="form-grid">

                            <div class="form-group">

                                <label for="nombre">
                                    Nombre de la clase
                                </label>

                                <input
                                    type="text"
                                    id="nombre"
                                    placeholder="Ej: Pintura al Óleo"
                                    required
                                >

                            </div>

                            <div class="form-group">

                                <label for="tipo">
                                    Tipo de Arte
                                </label>

                                <input
                                    type="text"
                                    id="tipo"
                                    placeholder="Ej: Arte Visual"
                                    required
                                >

                            </div>

                            <div class="form-group">

                                <label for="nivel">
                                    Nivel
                                </label>

                                <select id="nivel">

                                    <option value="Principiante">
                                        Principiante
                                    </option>

                                    <option value="Intermedio">
                                        Intermedio
                                    </option>

                                    <option value="Avanzado">
                                        Avanzado
                                    </option>

                                </select>

                            </div>

                            <div class="form-group">

                                <label for="cupo">
                                    Cupo Disponible
                                </label>

                                <input
                                    type="number"
                                    id="cupo"
                                    placeholder="15"
                                    required
                                >

                            </div>

                        </div>

                        <div class="form-group full-width">

                            <label for="descripcion">
                                Descripción detallada de la clase
                            </label>

                            <textarea
                                id="descripcion"
                                rows="3"
                                placeholder="Describe los materiales, objetivos o temas..."
                            ></textarea>

                        </div>

                        <div class="form-buttons">

                            <button
                                type="submit"
                                id="btnGuardar"
                                class="btn-primary"
                            >

                                Guardar Clase

                            </button>

                            <button
                                type="button"
                                id="btnCancelar"
                                class="btn-cancel"
                                style="display: none;"
                            >

                                Cancelar Edición

                            </button>

                        </div>

                    </form>

                </div>

            </section>

            <section class="table-section">

                <h3 class="table-title">
                    Listado de Clases
                </h3>

                <div class="table-card">

                    <table class="custom-table">

                        <thead>

                            <tr>

                                <th>ID</th>

                                <th>Nombre</th>

                                <th>Tipo</th>

                                <th>Nivel</th>

                                <th>Cupo</th>

                                <th>Acciones</th>

                            </tr>

                        </thead>

                        <tbody id="tablaClases"></tbody>

                    </table>

                </div>

            </section>

        </main>

    </div>

<script>

    const API_URL = 'https://crearte-or0f.onrender.com';

    const token = localStorage.getItem('token');
    const rol = localStorage.getItem('rol');

    if (!token || rol !== 'admin') {

        alert('Debes iniciar sesión como administrador');

        window.location.href = '/login.html';

    }

    const claseForm = document.getElementById('claseForm');
    const tablaClases = document.getElementById('tablaClases');
    const idEdicionInput = document.getElementById('id_clase_edicion');
    const btnGuardar = document.getElementById('btnGuardar');
    const btnCancelar = document.getElementById('btnCancelar');

    let listaClasesLocal = [];

    claseForm.addEventListener('submit', async (e) => {

        e.preventDefault();

        const idEdicion = idEdicionInput.value;

        const datos = {

            nombre_clase: document.getElementById('nombre').value,
            tipo: document.getElementById('tipo').value,
            nivel: document.getElementById('nivel').value,
            descripcion: document.getElementById('descripcion').value,
            cupo_maximo: document.getElementById('cupo').value

        };

        try {

            let url = `${API_URL}/clases`;
            let metodo = 'POST';

            if (idEdicion) {

                url = `${API_URL}/clases/${idEdicion}`;
                metodo = 'PUT';

            }

            const respuesta = await fetch(url, {

                method: metodo,

                headers: {

                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`

                },

                body: JSON.stringify(datos)

            });

            if (respuesta.status === 401 || respuesta.status === 403) {

                alert('Tu sesión no es válida o no tienes permisos.');

                localStorage.clear();

                window.location.href = '/login.html';

                return;

            }

            if (respuesta.ok) {

                alert(idEdicion
                    ? '¡Clase actualizada con éxito!'
                    : '¡Clase registrada con éxito!'
                );

                resetearFormulario();

                cargarClases();

            } else {

                alert('Hubo un error en el servidor.');

            }

        } catch (error) {

            console.error('Error:', error);

            alert('No se pudo conectar con el servidor.');

        }

    });

    async function cargarClases() {

        try {

            const respuesta = await fetch(`${API_URL}/clases`, {

                headers: {
                    'Authorization': `Bearer ${token}`
                }

            });

            if (respuesta.status === 401 || respuesta.status === 403) {

                alert('Debes iniciar sesión como administrador');

                localStorage.clear();

                window.location.href = '/login.html';

                return;

            }

            listaClasesLocal = await respuesta.json();

            tablaClases.innerHTML = '';

            listaClasesLocal.forEach(clase => {

                const fila = document.createElement('tr');

                fila.innerHTML = `
                    <td>${clase.id_clase}</td>

                    <td>
                        <strong>${clase.nombre_clase}</strong>
                    </td>

                    <td>${clase.tipo}</td>

                    <td>
                        <span class="badge-nivel ${clase.nivel.toLowerCase()}">
                            ${clase.nivel}
                        </span>
                    </td>

                    <td>${clase.cupo_maximo}</td>

                    <td>

                        <button
                            class="btn-table-edit"
                            onclick="editarClase(${clase.id_clase})"
                        >
                            ✏️ Editar
                        </button>

                        <button
                            class="btn-table-delete"
                            onclick="eliminarClase(${clase.id_clase})"
                        >
                            🗑️ Borrar
                        </button>

                    </td>
                `;

                tablaClases.appendChild(fila);

            });

        } catch (error) {

            console.error('Error al cargar clases:', error);

        }

    }

    function editarClase(id) {

        const claseSeleccionada =
            listaClasesLocal.find(c => c.id_clase === id);

        if (claseSeleccionada) {

            idEdicionInput.value = claseSeleccionada.id_clase;

            document.getElementById('nombre').value =
                claseSeleccionada.nombre_clase;

            document.getElementById('tipo').value =
                claseSeleccionada.tipo;

            document.getElementById('nivel').value =
                claseSeleccionada.nivel;

            document.getElementById('descripcion').value =
                claseSeleccionada.descripcion || '';

            document.getElementById('cupo').value =
                claseSeleccionada.cupo_maximo;

            btnGuardar.textContent = "Actualizar Clase";

            btnGuardar.style.backgroundColor = "#2a9d8f";

            btnCancelar.style.display = "inline-block";

            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });

        }

    }

    async function eliminarClase(id) {

        if (confirm('¿Estás seguro de eliminar esta clase?')) {

            try {

                const respuesta = await fetch(
                    `${API_URL}/clases/${id}`,
                    {

                        method: 'DELETE',

                        headers: {
                            'Authorization': `Bearer ${token}`
                        }

                    }
                );

                if (respuesta.status === 401 || respuesta.status === 403) {

                    alert('Tu sesión no es válida.');

                    localStorage.clear();

                    window.location.href = '/login.html';

                    return;

                }

                if (respuesta.ok) {

                    alert('Clase eliminada con éxito.');

                    cargarClases();

                } else {

                    alert('No se pudo eliminar.');

                }

            } catch (error) {

                console.error('Error al eliminar:', error);

                alert('Error de conexión.');

            }

        }

    }

    function resetearFormulario() {

        claseForm.reset();

        idEdicionInput.value = "";

        btnGuardar.textContent = "Guardar Clase";

        btnGuardar.style.backgroundColor = "#9d8df1";

        btnCancelar.style.display = "none";

    }

    function cerrarSesion() {

        localStorage.clear();

        alert('Sesión cerrada correctamente');

        window.location.href = '/login.html';

    }

    btnCancelar.addEventListener('click', resetearFormulario);

    document.addEventListener('DOMContentLoaded', cargarClases);

</script>

</body>
</html>
